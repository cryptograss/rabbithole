<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbithole Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Video area --- */
        .player-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            min-height: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-area:hover .video-overlay {
            opacity: 1;
        }

        .now-playing {
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            max-width: 70%;
            pointer-events: auto;
        }

        .now-playing .title {
            font-weight: 600;
            color: #fff;
        }

        .now-playing .meta {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        .pip-btn {
            background: rgba(0, 0, 0, 0.75);
            border: none;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            pointer-events: auto;
        }

        .pip-btn:hover { background: rgba(60, 60, 60, 0.9); }

        /* --- Transport controls --- */
        .transport {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }

        .transport button {
            background: none;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.15s;
        }

        .transport button:hover { background: #0f3460; }
        .transport button:disabled { opacity: 0.3; cursor: default; }

        .transport .position {
            flex: 1;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }

        .transport .position span { color: #fff; }

        /* --- Playlist panel --- */
        .playlist-panel {
            background: #16213e;
            border-top: 1px solid #0f3460;
            max-height: 40vh;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            border-bottom: 1px solid #0f3460;
            cursor: pointer;
            user-select: none;
        }

        .playlist-header h3 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
        }

        .playlist-header .toggle { font-size: 12px; color: #666; }

        .playlist-list {
            overflow-y: auto;
            flex: 1;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }

        .playlist-item:hover { background: rgba(255,255,255,0.05); }
        .playlist-item.active { background: rgba(15, 52, 96, 0.6); }

        .playlist-item .index {
            width: 24px;
            text-align: center;
            font-size: 12px;
            color: #666;
            flex-shrink: 0;
        }

        .playlist-item.active .index { color: #4ecca3; }

        .playlist-item .info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item .info .name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item.active .info .name { color: #4ecca3; }

        .playlist-item .info .type-badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(255,255,255,0.08);
            color: #888;
            margin-top: 2px;
        }

        .playlist-item .remove-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .playlist-item .remove-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.15); }

        /* --- Catalog (available releases) --- */
        .catalog-panel {
            background: #1a1a2e;
            border-top: 1px solid #0f3460;
            max-height: 35vh;
            display: flex;
            flex-direction: column;
        }

        .catalog-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-bottom: 1px solid #0f3460;
            cursor: pointer;
            user-select: none;
        }

        .catalog-header h3 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #aaa;
        }

        .catalog-search {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 8px;
            color: #e0e0e0;
            font-size: 12px;
            outline: none;
        }

        .catalog-search:focus { border-color: #4ecca3; }

        .catalog-list {
            overflow-y: auto;
            flex: 1;
        }

        .catalog-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.15s;
        }

        .catalog-item:hover { background: rgba(78, 204, 163, 0.08); }
        .catalog-item.in-playlist { opacity: 0.4; }

        .catalog-item .info {
            flex: 1;
            min-width: 0;
        }

        .catalog-item .info .name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .catalog-item .info .type-badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(255,255,255,0.08);
            color: #888;
            margin-top: 2px;
        }

        .catalog-item .add-btn {
            background: none;
            border: 1px solid #4ecca3;
            color: #4ecca3;
            cursor: pointer;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 3px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .catalog-item .add-btn:hover { background: rgba(78, 204, 163, 0.15); }
        .catalog-item.in-playlist .add-btn { display: none; }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #555;
            font-size: 13px;
        }

        /* Collapsible sections */
        .collapsed .playlist-list,
        .collapsed .catalog-list,
        .collapsed .catalog-search { display: none; }
    </style>
</head>
<body>

<div class="player-area" id="playerArea">
    <video id="video" playsinline></video>
    <div class="video-overlay">
        <div class="now-playing" id="nowPlaying" style="display:none">
            <div class="title" id="nowTitle"></div>
            <div class="meta" id="nowMeta"></div>
        </div>
        <button class="pip-btn" id="pipBtn" title="Picture-in-Picture">&#x1F5D7;</button>
    </div>
</div>

<div class="transport">
    <button id="prevBtn" title="Previous" disabled>&#x23EE;</button>
    <button id="playBtn" title="Play/Pause">&#x25B6;</button>
    <button id="nextBtn" title="Next" disabled>&#x23ED;</button>
    <div class="position">
        <span id="currentIndex">-</span> / <span id="totalCount">0</span>
    </div>
</div>

<div class="playlist-panel" id="playlistPanel">
    <div class="playlist-header" id="playlistHeader">
        <h3>Playlist (<span id="playlistCount">0</span>)</h3>
        <span class="toggle">&#x25BC;</span>
    </div>
    <div class="playlist-list" id="playlistList">
        <div class="empty-state">Add releases from the catalog below</div>
    </div>
</div>

<div class="catalog-panel" id="catalogPanel">
    <div class="catalog-header" id="catalogHeader">
        <h3>Releases</h3>
        <input type="text" class="catalog-search" id="catalogSearch" placeholder="Filter...">
    </div>
    <div class="catalog-list" id="catalogList">
        <div class="loading">Loading releases...</div>
    </div>
</div>

<script>
const GATEWAY = 'https://ipfs.delivery-kid.cryptograss.live/ipfs';
const API = '/api-proxy';

// ---- State ----
let catalog = [];
let playlist = [];
let currentIdx = -1;
let hls = null;

// ---- DOM refs ----
const video = document.getElementById('video');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pipBtn = document.getElementById('pipBtn');
const nowPlaying = document.getElementById('nowPlaying');
const nowTitle = document.getElementById('nowTitle');
const nowMeta = document.getElementById('nowMeta');
const currentIndexEl = document.getElementById('currentIndex');
const totalCountEl = document.getElementById('totalCount');
const playlistList = document.getElementById('playlistList');
const playlistCount = document.getElementById('playlistCount');
const catalogList = document.getElementById('catalogList');
const catalogSearch = document.getElementById('catalogSearch');

// ---- Helpers ----
function videoUrl(release) {
    const cid = release.ipfs_cid;
    if (release.file_type === 'video/hls') {
        return `${GATEWAY}/${cid}/master.m3u8`;
    }
    return `${GATEWAY}/${cid}`;
}

function isHls(release) {
    return release.file_type === 'video/hls';
}

function formatType(ft) {
    if (!ft) return '?';
    return ft.replace('video/', '').toUpperCase();
}

// ---- HLS management ----
function destroyHls() {
    if (hls) {
        hls.destroy();
        hls = null;
    }
}

function loadSource(release) {
    destroyHls();
    const url = videoUrl(release);

    if (isHls(release) && Hls.isSupported()) {
        hls = new Hls({
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        hls.on(Hls.Events.ERROR, (_, data) => {
            if (data.fatal) {
                console.error('HLS fatal error:', data);
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    hls.startLoad();
                } else {
                    destroyHls();
                }
            }
        });
    } else if (isHls(release) && video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS (Safari)
        video.src = url;
        video.addEventListener('loadedmetadata', () => video.play(), { once: true });
    } else {
        video.src = url;
        video.addEventListener('loadedmetadata', () => video.play(), { once: true });
    }
}

// ---- Playback ----
function playCurrent() {
    if (currentIdx < 0 || currentIdx >= playlist.length) return;
    const release = playlist[currentIdx];

    loadSource(release);

    nowTitle.textContent = release.title || release.page_title || 'Untitled';
    nowMeta.textContent = formatType(release.file_type);
    nowPlaying.style.display = '';

    updateTransport();
    renderPlaylist();
}

function updateTransport() {
    prevBtn.disabled = currentIdx <= 0;
    nextBtn.disabled = currentIdx >= playlist.length - 1;
    currentIndexEl.textContent = playlist.length > 0 ? currentIdx + 1 : '-';
    totalCountEl.textContent = playlist.length;
    playlistCount.textContent = playlist.length;
}

// ---- Playlist operations ----
function addToPlaylist(release) {
    if (playlist.some(r => r.ipfs_cid === release.ipfs_cid)) return;
    playlist.push(release);

    if (playlist.length === 1) {
        currentIdx = 0;
        playCurrent();
    } else {
        updateTransport();
        renderPlaylist();
    }
    renderCatalog();
}

function removeFromPlaylist(idx) {
    if (idx < 0 || idx >= playlist.length) return;
    const wasPlaying = idx === currentIdx;
    playlist.splice(idx, 1);

    if (playlist.length === 0) {
        currentIdx = -1;
        destroyHls();
        video.removeAttribute('src');
        video.load();
        nowPlaying.style.display = 'none';
    } else if (wasPlaying) {
        currentIdx = Math.min(idx, playlist.length - 1);
        playCurrent();
    } else if (idx < currentIdx) {
        currentIdx--;
    }

    updateTransport();
    renderPlaylist();
    renderCatalog();
}

// ---- Rendering ----
function renderPlaylist() {
    if (playlist.length === 0) {
        playlistList.innerHTML = '<div class="empty-state">Add releases from the catalog below</div>';
        return;
    }

    playlistList.innerHTML = playlist.map((r, i) => `
        <div class="playlist-item ${i === currentIdx ? 'active' : ''}" data-idx="${i}">
            <div class="index">${i === currentIdx ? '&#x25B6;' : i + 1}</div>
            <div class="info">
                <div class="name">${r.title || r.page_title || 'Untitled'}</div>
                <span class="type-badge">${formatType(r.file_type)}</span>
            </div>
            <button class="remove-btn" data-remove="${i}" title="Remove">&times;</button>
        </div>
    `).join('');

    playlistList.querySelectorAll('.playlist-item').forEach(el => {
        el.addEventListener('click', (e) => {
            if (e.target.closest('.remove-btn')) return;
            const idx = parseInt(el.dataset.idx);
            if (idx !== currentIdx) {
                currentIdx = idx;
                playCurrent();
            }
        });
    });

    playlistList.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeFromPlaylist(parseInt(btn.dataset.remove));
        });
    });
}

function renderCatalog(filter = '') {
    const term = filter.toLowerCase();
    const filtered = catalog.filter(r => {
        const name = (r.title || r.page_title || '').toLowerCase();
        return name.includes(term);
    });

    if (filtered.length === 0) {
        catalogList.innerHTML = '<div class="empty-state">No matching releases</div>';
        return;
    }

    const inPlaylistCids = new Set(playlist.map(r => r.ipfs_cid));

    catalogList.innerHTML = filtered.map(r => {
        const inPl = inPlaylistCids.has(r.ipfs_cid);
        return `
            <div class="catalog-item ${inPl ? 'in-playlist' : ''}" data-cid="${r.ipfs_cid}">
                <div class="info">
                    <div class="name">${r.title || r.page_title || 'Untitled'}</div>
                    <span class="type-badge">${formatType(r.file_type)}</span>
                </div>
                <button class="add-btn">${inPl ? 'Added' : '+ Add'}</button>
            </div>
        `;
    }).join('');

    catalogList.querySelectorAll('.catalog-item:not(.in-playlist)').forEach(el => {
        el.addEventListener('click', () => {
            const release = catalog.find(r => r.ipfs_cid === el.dataset.cid);
            if (release) addToPlaylist(release);
        });
    });
}

// ---- Events ----
playBtn.addEventListener('click', () => {
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
});

video.addEventListener('play', () => playBtn.textContent = '\u23F8');
video.addEventListener('pause', () => playBtn.textContent = '\u25B6');

video.addEventListener('ended', () => {
    if (currentIdx < playlist.length - 1) {
        currentIdx++;
        playCurrent();
    }
});

prevBtn.addEventListener('click', () => {
    if (currentIdx > 0) {
        currentIdx--;
        playCurrent();
    }
});

nextBtn.addEventListener('click', () => {
    if (currentIdx < playlist.length - 1) {
        currentIdx++;
        playCurrent();
    }
});

pipBtn.addEventListener('click', async () => {
    try {
        if (document.pictureInPictureElement) {
            await document.exitPictureInPicture();
        } else {
            await video.requestPictureInPicture();
        }
    } catch (err) {
        console.error('PiP error:', err);
    }
});

catalogSearch.addEventListener('input', () => renderCatalog(catalogSearch.value));

// Collapsible headers
document.getElementById('playlistHeader').addEventListener('click', () => {
    document.getElementById('playlistPanel').classList.toggle('collapsed');
});
document.getElementById('catalogHeader').addEventListener('click', (e) => {
    if (e.target === catalogSearch) return;
    document.getElementById('catalogPanel').classList.toggle('collapsed');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
        case ' ':
            e.preventDefault();
            playBtn.click();
            break;
        case 'ArrowLeft':
            if (e.shiftKey) { prevBtn.click(); }
            else { video.currentTime = Math.max(0, video.currentTime - 10); }
            break;
        case 'ArrowRight':
            if (e.shiftKey) { nextBtn.click(); }
            else { video.currentTime += 10; }
            break;
        case 'p':
            pipBtn.click();
            break;
    }
});

// ---- Init ----
async function init() {
    try {
        const resp = await fetch(`${API}?action=releaselist&filter=ipfs&format=json&origin=*`);
        const data = await resp.json();
        const releases = data.releases || [];

        // Filter to video releases pinned on delivery-kid
        catalog = releases.filter(r => {
            const ft = r.file_type || '';
            const pinned = r.pinned_on || [];
            return ft.startsWith('video/') && pinned.includes('delivery-kid');
        });

        // Sort by title
        catalog.sort((a, b) => {
            const at = (a.title || a.page_title || '').toLowerCase();
            const bt = (b.title || b.page_title || '').toLowerCase();
            return at.localeCompare(bt);
        });

        renderCatalog();
    } catch (err) {
        catalogList.innerHTML = `<div class="empty-state">Failed to load releases: ${err.message}</div>`;
    }
}

init();
</script>
</body>
</html>
