<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickiPedia + Rabbithole Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <!-- Resolve bare specifiers used by src/player/webamp-chartifacts.js
         and src/editor/* (which were Vite-resolved at dev time). jsDelivr's
         +esm shim auto-converts npm packages to ES modules. -->
    <script type="importmap">
    {
        "imports": {
            "webamp": "https://cdn.jsdelivr.net/npm/webamp@1.5.0/+esm",
            "packery": "https://cdn.jsdelivr.net/npm/packery@3.0.0/+esm",
            "js-yaml": "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/+esm"
        }
    }
    </script>
    <link rel="stylesheet" href="./src/styles/editor.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            gap: 0;
            transition: grid-template-columns 0.3s ease;
        }

        .layout.minimized {
            grid-template-columns: 56px 1fr;
        }

        .layout.with-editor {
            grid-template-columns: 320px 1fr 360px;
        }

        .layout.minimized.with-editor {
            grid-template-columns: 56px 1fr 360px;
        }

        .rabbithole-sidebar {
            background: white;
            border-right: 2px solid #4a7c59;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 0;
            transition: all 0.3s ease;
        }

        .layout.minimized .rabbithole-sidebar {
            overflow: hidden;
        }

        .rabbithole-header {
            background: linear-gradient(135deg, #9db89a 0%, #87a96b 100%);
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .rabbithole-header img {
            width: 28px;
            height: 28px;
        }

        .rabbithole-header h1 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .rabbithole-header .alpha {
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .minimize-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s;
        }

        .minimize-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .layout.minimized .rabbithole-header {
            padding: 10px;
            justify-content: center;
            cursor: pointer;
            flex-direction: column;
            gap: 8px;
        }

        .layout.minimized .rabbithole-header img {
            width: 32px;
            height: 32px;
        }

        .layout.minimized .rabbithole-header h1,
        .layout.minimized .rabbithole-header .alpha {
            display: none;
        }

        .layout.minimized .minimize-btn {
            margin-left: 0;
            width: 28px;
            height: 28px;
        }

        .layout.minimized .player-container {
            display: none;
        }

        .mini-player {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 25px 5px 10px 5px;
        }

        .layout.minimized .mini-player {
            display: flex;
        }

        .mini-player-btn {
            width: 34px;
            height: 60px;
            border: none;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 7px,
                    rgba(180, 70, 20, 0.25) 7px,
                    rgba(180, 70, 20, 0.25) 9px
                ),
                linear-gradient(to right, #ff9a56 0%, #ff6b35 25%, #ff8142 50%, #ff6b35 75%, #ff9a56 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            border-radius: 5px 5px 50% 50%;
            position: relative;
            box-shadow:
                0 3px 10px rgba(255, 107, 53, 0.35),
                inset 3px 0 6px rgba(255, 200, 150, 0.25),
                inset -3px 0 6px rgba(180, 60, 20, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .carrot-leaves-external {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: -4px;
            z-index: 10;
        }

        .carrot-leaves-external span {
            display: block;
            width: 10px;
            background: linear-gradient(135deg, #5a9c6a 0%, #4a7c59 50%, #3a6847 100%);
            border-radius: 50% 50% 2px 2px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        .carrot-leaves-external span:nth-child(1) {
            height: 16px;
            transform: rotate(-25deg);
        }

        .carrot-leaves-external span:nth-child(2) {
            height: 22px;
            width: 12px;
        }

        .carrot-leaves-external span:nth-child(3) {
            height: 16px;
            transform: rotate(25deg);
        }

        .mini-player-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.45);
        }

        .mini-player-btn.playing {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 7px,
                    rgba(160, 50, 10, 0.3) 7px,
                    rgba(160, 50, 10, 0.3) 9px
                ),
                linear-gradient(to right, #ff8142 0%, #e55a2b 25%, #ff6b35 50%, #e55a2b 75%, #ff8142 100%);
        }

        .mini-progress-ring {
            width: 44px;
            height: 44px;
            position: relative;
        }

        .mini-progress-ring svg {
            transform: rotate(-90deg);
        }

        .mini-progress-ring circle {
            fill: none;
            stroke-width: 3;
        }

        .mini-progress-ring .bg {
            stroke: #e0e0e0;
        }

        .mini-progress-ring .progress {
            stroke: #4a7c59;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.2s;
        }

        .mini-time {
            font-size: 9px;
            color: #666;
            text-align: center;
            margin-top: 4px;
            font-weight: 500;
        }

        .mini-musicians {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
            width: 100%;
            padding: 0 2px;
        }

        .mini-musician {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            color: #666;
            padding: 2px 4px;
            border-radius: 3px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .mini-musician:hover {
            background: rgba(74, 124, 89, 0.1);
        }

        .mini-musician.lead {
            background: rgba(74, 124, 89, 0.15);
            color: #4a7c59;
            font-weight: 600;
        }

        .mini-musician.out {
            opacity: 0.4;
        }

        .mini-musician .icon {
            font-size: 10px;
            width: 14px;
            text-align: center;
        }

        .mini-musician .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-container {
            padding: 6px 10px;
            position: relative;
        }

        .song-select {
            width: 100%;
            padding: 6px 10px;
            margin-bottom: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #555;
        }

        .inline-carrot-btn {
            width: 30px;
            height: 42px;
            border: none;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 5px,
                    rgba(180, 70, 20, 0.25) 5px,
                    rgba(180, 70, 20, 0.25) 6px
                ),
                linear-gradient(to right, #ff9a56 0%, #ff6b35 25%, #ff8142 50%, #ff6b35 75%, #ff9a56 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.2s;
            border-radius: 4px 4px 50% 50%;
            position: relative;
            box-shadow: 0 2px 6px rgba(255, 107, 53, 0.3);
            margin-left: auto;
            margin-top: 8px;
            align-self: flex-start;
        }

        .inline-carrot-btn:hover {
            transform: scale(1.1);
        }

        .inline-carrot-btn.playing {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 5px,
                    rgba(160, 50, 10, 0.3) 5px,
                    rgba(160, 50, 10, 0.3) 6px
                ),
                linear-gradient(to right, #ff8142 0%, #e55a2b 25%, #ff6b35 50%, #e55a2b 75%, #ff8142 100%);
        }

        .inline-carrot-leaves {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1px;
            align-items: flex-end;
        }

        .inline-carrot-leaves span {
            display: block;
            width: 6px;
            background: linear-gradient(135deg, #5a9c6a 0%, #4a7c59 50%, #3a6847 100%);
            border-radius: 50% 50% 1px 1px;
        }

        .inline-carrot-leaves span:nth-child(1) {
            height: 8px;
            transform: rotate(-25deg);
        }

        .inline-carrot-leaves span:nth-child(2) {
            height: 12px;
            width: 7px;
        }

        .inline-carrot-leaves span:nth-child(3) {
            height: 8px;
            transform: rotate(25deg);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: #4a7c59;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .webamp-wrapper {
            min-height: 410px;  /* Room for webamp + 6 compact musician cards */
            margin-bottom: 6px;
            position: relative;
        }

        .data-section {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid #4a7c59;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            color: #4a7c59;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        /* Compact ensemble layout — fit all 6 cards without scrolling. */
        .musician-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 6px;
        }

        .musician-card {
            padding: 3px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .musician-card:hover {
            border-color: #4a7c59;
            background: rgba(74, 124, 89, 0.05);
        }

        .musician-card.lead {
            border: 2px solid #4a7c59;
            background: rgba(74, 124, 89, 0.1);
        }

        .musician-card.out {
            opacity: 0.4;
        }

        .musician-name {
            font-weight: 600;
            color: #4a7c59;
            font-size: 13px;
            line-height: 1.2;
        }

        /* Mock provenance line — hide for now; bring back when real
           NFT ownership data is wired in. */
        .chartifact-line {
            display: none;
        }

        .musician-instrument {
            font-size: 11px;
            color: #888;
        }

        .parts-chart {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 3px 0;
        }

        .part-box {
            padding: 3px 6px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 11px;
            color: #666;
        }

        .part-box.active {
            background: #4a7c59;
            color: white;
            border-color: #4a7c59;
        }

        .pickipedia-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .connection-hint {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px;
            margin: 10px 0;
            font-size: 12px;
        }

        .connection-hint strong {
            color: #856404;
        }

        /* Hide webamp extra windows */
        #webamp #equalizer-window,
        #webamp #playlist-window {
            display: none !important;
        }

        /* Editor panel inline styles */
        .editor-panel {
            background: #fff;
            border-left: 2px solid #4a7c59;
            overflow-y: auto;
            padding: 0;
        }

        .editor-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: linear-gradient(135deg, #9db89a 0%, #87a96b 100%);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .editor-panel-header h3 {
            margin: 0;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        .editor-close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .editor-close-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .editor-save-section {
            padding: 10px 15px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #save-status {
            font-size: 12px;
            color: #666;
        }

        #save-status.success {
            color: #4a7c59;
        }

        #save-status.error {
            color: #c00;
        }

        #keyboard-help {
            padding: 10px 15px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="rabbithole-sidebar">
            <div class="rabbithole-header" id="rabbithole-header">
                <img src="./src/images/rabbit.png" alt="Rabbithole" onclick="if(document.querySelector('.layout').classList.contains('minimized')) toggleSidebar()" style="cursor: pointer;">
                <h1>rabbithole</h1>
                <span class="alpha">ALPHA5</span>
                <button class="minimize-btn" onclick="toggleSidebar()" title="Minimize/Maximize">
                    <span id="minimize-icon">◀</span>
                </button>
            </div>

            <div class="mini-player">
                <div class="carrot-leaves-external">
                    <span></span><span></span><span></span>
                </div>
                <button class="mini-player-btn" id="mini-play-btn" onclick="toggleMiniPlay()" title="Play/Pause">
                    ▶
                </button>
                <div class="mini-progress-ring">
                    <svg width="44" height="44">
                        <circle class="bg" cx="22" cy="22" r="18"></circle>
                        <circle class="progress" id="mini-progress-circle" cx="22" cy="22" r="18"
                            stroke-dasharray="113" stroke-dashoffset="113"></circle>
                    </svg>
                </div>
                <div class="mini-time" id="mini-time">0:00</div>
                <div class="mini-musicians" id="mini-musicians"></div>
            </div>

            <div class="player-container">
                <select id="song-selector" class="song-select" onchange="loadSelectedSong()">
                    <option value="august">August - Vowel Sounds</option>
                    <option value="silver-44">Silver 44 - 4masks</option>
                    <option value="barlows-jig">Barlow's Jig - Vowel Sounds</option>
                    <option value="paint-exchange">Paint Exchange - 4masks</option>
                </select>

                <div class="toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="auto-switch-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span>Auto-switch artist profiles</span>
                    <button class="inline-carrot-btn" id="inline-play-btn" onclick="toggleMiniPlay()" title="Play/Pause">
                        <span class="inline-carrot-leaves"><span></span><span></span><span></span></span>
                        ▶
                    </button>
                </div>

                <div class="toggle-row">
                    <button id="editor-toggle-btn" class="editor-toggle-btn" onclick="toggleEditor()">
                        Edit Timeline
                    </button>
                </div>

                <div class="webamp-wrapper">
                    <div id="webamp-player">Loading player...</div>
                </div>

                <div class="data-section">
                    <div class="section-label">Song Parts</div>
                    <div id="parts-chart" class="parts-chart"></div>
                </div>

                <!-- Hidden container for embed mode compatibility -->
                <div id="ensemble-display" class="musician-list" style="display: none;"></div>
            </div>
        </div>

        <iframe id="pickipedia-frame" class="pickipedia-frame" src="/wiki/Justin_Holmes"></iframe>

        <!-- Editor Panel -->
        <div id="editor-panel" class="editor-panel" style="display: none;">
            <div class="editor-panel-header">
                <h3>Timeline Editor</h3>
                <button id="editor-close-btn" class="editor-close-btn" title="Close editor">x</button>
            </div>
            <div id="timeline-editor-container"></div>
            <div class="editor-save-section">
                <button id="save-to-wiki-btn" class="btn-save-wiki" disabled>Save to PickiPedia</button>
                <span id="save-status"></span>
            </div>
            <div id="keyboard-help"></div>
        </div>
    </div>

    <script type="module">
        // Song data
        const songs = {

                            "Cory Walker": "out",
                            "Samson Grisman": "out",
                            "John Mailander": "out",
                            "Kaitlyn Raitz": "out",
                            "Harry Clark": "out"
                        },
                        solo: "Justin Holmes",
                        part: "A"
                    },
                    13: { musicians: { "band": "in" } },
                    27: { solo: "John Mailander" },
                    47: { part: "B" },
                    59: { part: "A" },
                    72: { solo: "Kaitlyn Raitz" },
                    83: { solo: "Harry Clark" },
                    106: { solo: "Samson Grisman", part: "B" },
                    118: { solo: "Cory Walker", part: "A" },
                    166: { solo: "John Mailander", part: "B" },
                    183: { solo: "Justin Holmes", instrumentChanges: { "Justin Holmes": "throatsinging" } },
                    190: { part: "A" }
                },
                standardSectionLength: 20
            }
        };

        // Color scheme
        const defaultColorScheme = {
            solo: { border: "#4a7c59", background: "rgba(74, 124, 89, 0.1)", textColor: "#2d5016", glowColor: "rgba(74, 124, 89, 0.4)" },
            pickup: { border: "#87a96b", background: "rgba(135, 169, 107, 0.1)", textColor: "#5a7a4a" }
        };
        Object.values(songs).forEach(song => { song.colorScheme = defaultColorScheme; });

        // If a ?track={cid} URL param is present, fetch the track's data from
        // the wiki and use that as the active song. This is the production
        // entry point: pickipedia's Release pages link here with their CID,
        // e.g. /rabbithole/pickipedia-demo.html?track=QmS3QEZF...
        //
        // Falls back to the hardcoded `songs['august']` when no param is
        // present (preserves the standalone demo for local dev).
        const IPFS_GATEWAY = 'https://ipfs.delivery-kid.cryptograss.live';

        async function fetchYamlPage(title) {
            const params = new URLSearchParams({
                action: 'query',
                titles: title,
                prop: 'revisions',
                rvprop: 'content',
                rvslots: 'main',
                format: 'json',
                origin: '*'
            });
            const r = await fetch('/api.php?' + params);
            const j = await r.json();
            const page = Object.values(j.query?.pages || {})[0];
            if (!page || page.missing !== undefined) return null;
            const text = page.revisions?.[0]?.slots?.main?.['*'] || '';
            return jsYaml.load(text) || {};
        }

        // Pull ensemble + timeline + standardSectionLength out of a metadata
        // YAML object. Supports two shapes:
        //
        //   1. Flat — keys at top level (the format my editor saves):
        //        ensemble: {...}
        //        timeline: {...}
        //        standardSectionLength: 13.65
        //
        //   2. Arthel song YAML — for paste-the-whole-file convenience:
        //        studio_versions:
        //          0:
        //            <AlbumName>:
        //              ensemble: {...}
        //              rabbithole:
        //                timeline: {...}
        //                standardSectionLength: 13.65
        //
        // For arthel shape, we walk the first studio version → first release
        // and pull ensemble (sibling) + rabbithole.{timeline,standardSectionLength}.
        function extractMetadata(data) {
            if (!data || typeof data !== 'object') return {};
            // Shape 1: flat
            if (data.timeline || data.ensemble) {
                return {
                    ensemble: data.ensemble || {},
                    timeline: data.timeline || {},
                    standardSectionLength: data.standardSectionLength,
                    title: data.title
                };
            }
            // Shape 2: arthel studio_versions tree
            const studioVersions = data.studio_versions;
            if (studioVersions && typeof studioVersions === 'object') {
                const firstVersionKey = Object.keys(studioVersions)[0];
                const firstVersion = studioVersions[firstVersionKey];
                if (firstVersion && typeof firstVersion === 'object') {
                    const firstReleaseKey = Object.keys(firstVersion)[0];
                    const release = firstVersion[firstReleaseKey];
                    if (release && typeof release === 'object') {
                        const rh = release.rabbithole || {};
                        return {
                            ensemble: release.ensemble || {},
                            timeline: rh.timeline || {},
                            standardSectionLength: rh.standardSectionLength,
                            title: firstReleaseKey
                        };
                    }
                }
            }
            return {};
        }

        async function loadTrackFromWiki(cid) {
            const trackData = await fetchYamlPage('Release:' + cid);
            if (!trackData) {
                throw new Error('Track Release page not found: ' + cid);
            }
            const metadataData = await fetchYamlPage('Release:' + cid + '/Metadata') || {};
            const metadata = extractMetadata(metadataData);

            const oggCid = trackData.encodings?.ogg;
            if (!oggCid) {
                throw new Error('Track has no OGG encoding for playback');
            }

            return {
                title: trackData.title || metadata.title || cid,
                album: trackData.parent_release || '',
                duration: trackData.duration || 180,
                audioFile: IPFS_GATEWAY + '/ipfs/' + oggCid,
                ensemble: metadata.ensemble,
                timeline: metadata.timeline,
                standardSectionLength: metadata.standardSectionLength,
                _trackCid: cid,
                _metadataTitle: 'Release:' + cid + '/Metadata'
            };
        }

        // jsyaml is loaded as a UMD global from the <script> tag in <head>.
        const jsYaml = window.jsyaml;

        const trackParam = new URLSearchParams(window.location.search).get('track');
        if (trackParam) {
            try {
                const wikiSong = await loadTrackFromWiki(trackParam);
                wikiSong.colorScheme = defaultColorScheme;
                songs[trackParam] = wikiSong;
                window.songChartifactsData = wikiSong;
                // Hide the song selector — we're locked to one track in this mode.
                const selector = document.getElementById('song-selector');
                if (selector) selector.style.display = 'none';
                // Park the right pane on this track's /Metadata page.
                document.getElementById('pickipedia-frame').src =
                    '/wiki/' + wikiSong._metadataTitle;
            } catch (err) {
                console.error('Failed to load track from wiki:', err);
                document.getElementById('webamp-player').innerHTML =
                    '<p style="padding:1em;color:#a00">Could not load track ' +
                    trackParam + ': ' + err.message + '</p>';
                window.songChartifactsData = songs['august'];
            }
        } else {
            window.songChartifactsData = songs['august'];
        }
        window.allSongs = songs;

        // Navigate to musician's PickiPedia page
        window.navigateToMusician = function(musicianName) {
            const slug = musicianName.replace(/\s+/g, '_');
            document.getElementById('pickipedia-frame').src = '/wiki/' + slug;
        };

        // Load selected song
        window.loadSelectedSong = async function() {
            const selector = document.getElementById('song-selector');
            const songKey = selector.value;
            const newSong = songs[songKey];
            if (!newSong) return;

            window.songChartifactsData = newSong;

            if (window.chartifactsPlayer && typeof window.chartifactsPlayer.loadNewSong === 'function') {
                await window.chartifactsPlayer.loadNewSong(newSong);
                setTimeout(addMusicianClickHandlers, 500);
            }
        };

        function addMusicianClickHandlers() {
            document.querySelectorAll('.musician-card').forEach(card => {
                card.onclick = () => {
                    const name = card.dataset.musician;
                    if (name) navigateToMusician(name);
                };
            });
        }

        // Initialize player
        const { default: WebampChartifacts } = await import('./src/player/webamp-chartifacts.js');

        window.chartifactsPlayer = new WebampChartifacts('webamp-player', window.songChartifactsData, {
            embedMode: false,
            fixedPosition: false,
            onSoloChange: (musicianName) => {
                const autoSwitch = document.getElementById('auto-switch-toggle').checked;
                if (autoSwitch) {
                    console.log('Solo changed to:', musicianName);
                    navigateToMusician(musicianName);
                }
            }
        });

        // Add click handlers after player loads
        setTimeout(addMusicianClickHandlers, 2000);

        // Instrument icons mapping
        const instrumentIcons = {
            'guitar': '🎸',
            'mandolin': '🎸',
            'banjo': '🪕',
            '5-string banjo': '🪕',
            'fiddle': '🎻',
            'violin': '🎻',
            'bass': '🎸',
            'dobro': '🎸',
            'cello': '🎻',
            'tin whistle': '🎵',
            'vocals': '🎤',
            'throatsinging': '🎤'
        };

        // Get initials from full name (e.g., "Justin Holmes" -> "JH")
        function getInitials(fullName) {
            return fullName.split(' ').map(n => n[0]).join('');
        }

        // Get instrument icon
        function getInstrumentIcon(instruments) {
            if (!instruments || !instruments.length) return '🎵';
            const inst = instruments[0].toLowerCase();
            for (const [key, icon] of Object.entries(instrumentIcons)) {
                if (inst.includes(key)) return icon;
            }
            return '🎵';
        }

        // Update mini musicians list
        function updateMiniMusicians() {
            const container = document.getElementById('mini-musicians');
            if (!container) return;

            const song = window.songChartifactsData;
            if (!song || !song.ensemble) return;

            container.innerHTML = '';

            Object.entries(song.ensemble).forEach(([name, instruments]) => {
                const div = document.createElement('div');
                div.className = 'mini-musician';
                div.dataset.musician = name;
                div.innerHTML = `
                    <span class="icon">${getInstrumentIcon(instruments)}</span>
                    <span class="name">${getInitials(name)}</span>
                `;
                div.onclick = () => navigateToMusician(name);
                container.appendChild(div);
            });
        }

        // Initialize mini musicians
        setTimeout(updateMiniMusicians, 2500);

        // Sync mini musicians with main display
        setInterval(() => {
            const mainCards = document.querySelectorAll('#ensemble-display .musician-card');
            const miniMusicians = document.querySelectorAll('.mini-musician');

            mainCards.forEach(card => {
                const name = card.dataset.musician;
                const mini = document.querySelector(`.mini-musician[data-musician="${name}"]`);
                if (mini) {
                    mini.classList.toggle('lead', card.classList.contains('lead'));
                    mini.classList.toggle('out', card.classList.contains('out'));
                }
            });
        }, 300);

        // Toggle sidebar minimize/maximize
        window.toggleSidebar = function() {
            const layout = document.querySelector('.layout');
            const icon = document.getElementById('minimize-icon');
            layout.classList.toggle('minimized');
            icon.textContent = layout.classList.contains('minimized') ? '▶' : '◀';
        };

        // Mini player controls
        window.toggleMiniPlay = function() {
            if (window.chartifactsPlayer && window.chartifactsPlayer.webamp && window.chartifactsPlayer.webamp.store) {
                const store = window.chartifactsPlayer.webamp.store;
                const state = store.getState();
                const status = state.media.status;

                if (status === 'PLAYING') {
                    store.dispatch({ type: 'PAUSE' });
                } else {
                    store.dispatch({ type: 'PLAY' });
                }
            }
        };

        window.seekMini = function(event) {
            if (window.chartifactsPlayer && window.chartifactsPlayer.webamp && window.chartifactsPlayer.webamp.store) {
                const rect = event.currentTarget.getBoundingClientRect();
                const clickY = event.clientY - rect.top;
                const height = rect.height;
                const percent = 1 - (clickY / height);
                const duration = window.songChartifactsData.duration || 180;
                const seekTime = Math.max(0, Math.min(duration, percent * duration));

                window.chartifactsPlayer.webamp.store.dispatch({
                    type: 'SEEK_TO_PERCENT_COMPLETE',
                    percent: percent * 100
                });
            }
        };

        // Update mini player UI
        setInterval(() => {
            if (window.chartifactsPlayer && window.chartifactsPlayer.webamp && window.chartifactsPlayer.webamp.store) {
                const state = window.chartifactsPlayer.webamp.store.getState();
                const { status, timeElapsed, length } = state.media;
                const duration = length || window.songChartifactsData.duration || 180;

                // Update play button states (both mini and inline)
                const miniBtn = document.getElementById('mini-play-btn');
                const inlineBtn = document.getElementById('inline-play-btn');
                if (status === 'PLAYING') {
                    miniBtn.innerHTML = '❚❚';  // No leaves - they're external
                    miniBtn.classList.add('playing');
                    if (inlineBtn) {
                        inlineBtn.innerHTML = '<span class="inline-carrot-leaves"><span></span><span></span><span></span></span>❚❚';
                        inlineBtn.classList.add('playing');
                    }
                } else {
                    miniBtn.innerHTML = '▶';  // No leaves - they're external
                    miniBtn.classList.remove('playing');
                    if (inlineBtn) {
                        inlineBtn.innerHTML = '<span class="inline-carrot-leaves"><span></span><span></span><span></span></span>▶';
                        inlineBtn.classList.remove('playing');
                    }
                }

                // Update progress ring
                const percent = timeElapsed / duration;
                const circumference = 2 * Math.PI * 18; // r=18
                const offset = circumference * (1 - percent);
                document.getElementById('mini-progress-circle').style.strokeDashoffset = offset;

                // Update time
                const mins = Math.floor(timeElapsed / 60);
                const secs = Math.floor(timeElapsed % 60).toString().padStart(2, '0');
                document.getElementById('mini-time').textContent = mins + ':' + secs;
            }
        }, 250);

        // ============================================
        // Timeline Editor Integration
        // ============================================

        // Editor state
        let editorInstance = null;
        let editableData = null;
        let keyboardShortcuts = null;

        // Toggle editor panel
        window.toggleEditor = async function() {
            const layout = document.querySelector('.layout');
            const panel = document.getElementById('editor-panel');
            const btn = document.getElementById('editor-toggle-btn');

            if (layout.classList.contains('with-editor')) {
                // Close editor
                layout.classList.remove('with-editor');
                panel.style.display = 'none';
                btn.classList.remove('active');
                btn.textContent = 'Edit Timeline';

                // Clean up
                if (keyboardShortcuts) keyboardShortcuts.dispose();
                if (editorInstance) editorInstance.dispose();
                if (editableData) editableData.dispose();
                editorInstance = null;
                editableData = null;
                keyboardShortcuts = null;
            } else {
                // Open editor
                layout.classList.add('with-editor');
                panel.style.display = 'block';
                btn.classList.add('active');
                btn.textContent = 'Close Editor';

                // Initialize editor
                await initializeEditor();
            }
        };

        // Close button handler
        document.getElementById('editor-close-btn').addEventListener('click', toggleEditor);

        async function initializeEditor() {
            // Import editor modules
            const { EditableTrackData } = await import('./src/editor/EditableTrackData.js');
            const { TimelineEditor } = await import('./src/editor/TimelineEditor.js');
            const { KeyboardShortcuts } = await import('./src/editor/keyboard-shortcuts.js');
            const { WikiSync } = await import('./src/editor/wiki-sync.js');

            // Get current song data
            const currentSong = window.songChartifactsData;
            const recordingTitle = `${currentSong.title} (${currentSong.album})`;

            // Create editable data state
            editableData = new EditableTrackData(currentSong, {
                recordingTitle: recordingTitle,
                onDirtyChange: (isDirty) => {
                    const saveBtn = document.getElementById('save-to-wiki-btn');
                    saveBtn.disabled = !isDirty;
                    saveBtn.textContent = isDirty ? 'Save to PickiPedia' : 'Saved';
                }
            });

            // Create the editor UI
            editorInstance = new TimelineEditor(
                'timeline-editor-container',
                editableData,
                window.chartifactsPlayer
            );

            // Set up keyboard shortcuts
            keyboardShortcuts = new KeyboardShortcuts(editorInstance, editableData, {
                onSave: saveToWiki
            });

            // Add keyboard help
            document.getElementById('keyboard-help').innerHTML = keyboardShortcuts.getHelpHTML();

            // Set up save button
            document.getElementById('save-to-wiki-btn').addEventListener('click', saveToWiki);
        }

        async function saveToWiki() {
            if (!editableData || !editableData.isDirty) {
                return;
            }

            const saveBtn = document.getElementById('save-to-wiki-btn');
            const statusSpan = document.getElementById('save-status');

            saveBtn.disabled = true;
            saveBtn.classList.add('saving');
            saveBtn.textContent = 'Saving...';
            statusSpan.textContent = '';
            statusSpan.className = '';

            try {
                const currentSong = window.songChartifactsData;

                // If this song was loaded via ?track= URL param, write back
                // to its Release:Qm.../Metadata page using plain YAML and the
                // recording-metadata-yaml content model. Same-origin with
                // pickipedia.xyz, so the user's session cookie + CSRF token
                // dance just works.
                if (currentSong._metadataTitle) {
                    const yamlBody = jsYaml.dump({
                        timeline: editableData.workingData.timeline || {},
                        ensemble: editableData.workingData.ensemble || {},
                        ...(editableData.workingData.standardSectionLength != null
                            ? { standardSectionLength: editableData.workingData.standardSectionLength }
                            : {}),
                        ...(currentSong.title ? { title: currentSong.title } : {})
                    }, { sortKeys: false, lineWidth: 120 });

                    const tokRes = await fetch(
                        '/api.php?action=query&meta=tokens&format=json',
                        { credentials: 'include' }
                    );
                    const tokJson = await tokRes.json();
                    const csrf = tokJson.query?.tokens?.csrftoken;
                    if (!csrf || csrf === '+\\') {
                        throw new Error('Not logged in to PickiPedia.');
                    }

                    const editParams = new URLSearchParams({
                        action: 'edit',
                        title: currentSong._metadataTitle,
                        text: yamlBody,
                        summary: 'Update timeline data via Rabbithole Editor',
                        token: csrf,
                        contentmodel: 'recording-metadata-yaml',
                        format: 'json'
                    });
                    const r = await fetch('/api.php', {
                        method: 'POST',
                        body: editParams,
                        credentials: 'include'
                    });
                    const j = await r.json();
                    if (j.error) {
                        throw new Error(j.error.info || j.error.code);
                    }
                    editableData.markSaved();
                    statusSpan.textContent = 'Saved!';
                    statusSpan.className = 'success';
                    saveBtn.textContent = 'Saved';

                } else {
                    // Local dev / standalone demo path — write to the legacy
                    // Recording:Song (Album)/Rabbithole subpage.
                    const { WikiSync, trackDataToWikiFormat } = await import('./src/editor/wiki-sync.js');
                    const wikiSync = new WikiSync();
                    const recordingTitle = `${currentSong.title} (${currentSong.album})`;
                    const wikiData = trackDataToWikiFormat(editableData.workingData);
                    const result = await wikiSync.saveRabbitholeData(recordingTitle, wikiData, {
                        summary: 'Update timeline data via Rabbithole Editor'
                    });
                    if (result.success) {
                        editableData.markSaved();
                        statusSpan.textContent = 'Saved!';
                        statusSpan.className = 'success';
                        saveBtn.textContent = 'Saved';
                    } else {
                        throw new Error(result.error || 'Save failed');
                    }
                }

            } catch (error) {
                console.error('Save failed:', error);
                statusSpan.textContent = error.message;
                statusSpan.className = 'error';
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save to PickiPedia';
            }

            saveBtn.classList.remove('saving');
        }

        // Handle song change - reinitialize editor if open
        const originalLoadSelectedSong = window.loadSelectedSong;
        window.loadSelectedSong = async function() {
            await originalLoadSelectedSong();

            // If editor is open, reinitialize with new song
            if (editorInstance) {
                const currentSong = window.songChartifactsData;
                const recordingTitle = `${currentSong.title} (${currentSong.album})`;

                // Check for unsaved changes
                if (editableData && editableData.isDirty) {
                    if (!confirm('You have unsaved changes. Switch songs anyway?')) {
                        return;
                    }
                }

                // Clean up old editor
                if (keyboardShortcuts) keyboardShortcuts.dispose();
                if (editorInstance) editorInstance.dispose();
                if (editableData) editableData.dispose();

                // Reinitialize
                await initializeEditor();
            }
        };
    </script>
</body>
</html>
